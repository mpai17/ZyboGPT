<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#546E7A"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8E24AA"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#90A4AE"/>
    </marker>
  </defs>

  <rect width="700" height="540" fill="#fff"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 0: Zynq PS                                 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="100" y="8" width="220" height="32" rx="4"
        fill="#ECEFF1" stroke="#78909C" stroke-width="1.5"/>
  <text x="210" y="28" text-anchor="middle"
        font-size="13" font-weight="500" fill="#37474F">Zynq PS (ARM Cortex-A9)</text>

  <line x1="210" y1="40" x2="210" y2="56"
        stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="250" y="52" font-size="10" fill="#90A4AE" font-style="italic">AXI4-Lite</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 1: AxiLiteSlave                             -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="126" y="56" width="168" height="28" rx="4"
        fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="210" y="74" text-anchor="middle"
        font-size="13" font-weight="500" fill="#1565C0">AxiLiteSlave</text>

  <line x1="210" y1="84" x2="210" y2="108"
        stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 2: Embedding                                -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="122" y="108" width="176" height="36" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="210" y="123" text-anchor="middle"
        font-size="13" font-weight="500" fill="#2E7D32">Embedding</text>
  <text x="210" y="137" text-anchor="middle"
        font-size="10" fill="#66BB6A">tok + pos lookup</text>

  <line x1="210" y1="144" x2="210" y2="172"
        stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="240" y="162" font-size="10" fill="#90A4AE" font-style="italic">actBuf</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 3: TransformerLayer (×2)                    -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="70" y="172" width="280" height="116" rx="6"
        fill="#F1F8E9" stroke="#7CB342" stroke-width="1.8"/>
  <text x="210" y="192" text-anchor="middle"
        font-size="14" font-weight="600" fill="#33691E">TransformerLayer (&#xd7;2)</text>

  <!-- Layer-internal flow: two sub-pipeline rows -->
  <text x="210" y="225" text-anchor="middle"
        font-size="12" fill="#558B2F">Norm &#x2192; Attention &#x2192; (+) residual</text>
  <text x="210" y="260" text-anchor="middle"
        font-size="12" fill="#558B2F">Norm &#x2192; FeedForward &#x2192; (+) residual</text>

  <!-- Thin separator between the two sub-rows -->
  <line x1="100" y1="240" x2="320" y2="240"
        stroke="#AED581" stroke-width="0.8" stroke-dasharray="4 3"/>

  <line x1="210" y1="288" x2="210" y2="316"
        stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="240" y="306" font-size="10" fill="#90A4AE" font-style="italic">actBuf</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 4: FinalNorm                                -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="136" y="316" width="148" height="30" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="210" y="335" text-anchor="middle"
        font-size="13" font-weight="500" fill="#2E7D32">FinalNorm</text>

  <line x1="210" y1="346" x2="210" y2="372"
        stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="240" y="363" font-size="10" fill="#90A4AE" font-style="italic">actBuf</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 5: Logits                                   -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="115" y="372" width="190" height="36" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="210" y="387" text-anchor="middle"
        font-size="13" font-weight="500" fill="#2E7D32">Logits</text>
  <text x="210" y="401" text-anchor="middle"
        font-size="10" fill="#66BB6A">via Embedding (tied weights)</text>

  <line x1="210" y1="408" x2="210" y2="434"
        stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="244" y="425" font-size="10" fill="#90A4AE" font-style="italic">logitBuf</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 6: Sampling                                 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="131" y="434" width="158" height="36" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="210" y="449" text-anchor="middle"
        font-size="13" font-weight="500" fill="#2E7D32">Sampling</text>
  <text x="210" y="463" text-anchor="middle"
        font-size="10" fill="#66BB6A">argmax or temperature</text>

  <line x1="210" y1="470" x2="210" y2="494"
        stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROW 7: TOKEN_OUT                                -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="145" y="494" width="130" height="30" rx="4"
        fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="210" y="513" text-anchor="middle"
        font-size="13" font-weight="600" fill="#C62828">TOKEN_OUT</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Return path: TOKEN_OUT → AxiLiteSlave → PS      -->
  <!-- ═══════════════════════════════════════════════ -->
  <path d="M 145,509 H 48 V 70 H 126"
        stroke="#90A4AE" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SHARED RESOURCES (right column)                 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="392" y="172" width="270" height="116" rx="8"
        fill="none" stroke="#B0BEC5" stroke-width="1.2" stroke-dasharray="8 4"/>
  <text x="408" y="186" font-size="10" fill="#90A4AE"
        font-weight="600" letter-spacing="1">SHARED RESOURCES</text>

  <!-- WeightBram -->
  <rect x="408" y="192" width="238" height="28" rx="4"
        fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="527" y="204" text-anchor="middle"
        font-size="12" font-weight="500" fill="#6A1B9A">WeightBram</text>
  <text x="527" y="216" text-anchor="middle"
        font-size="9" fill="#AB47BC">TDotUnit + Decoders</text>

  <!-- MacArray -->
  <rect x="408" y="226" width="196" height="26" rx="4"
        fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="506" y="243" text-anchor="middle"
        font-size="12" font-weight="500" fill="#6A1B9A">MacArray</text>

  <!-- KvCache -->
  <rect x="408" y="258" width="168" height="26" rx="4"
        fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="492" y="275" text-anchor="middle"
        font-size="12" font-weight="500" fill="#F57F17">KvCache</text>

  <!-- ═══ Horizontal arrows: TransformerLayer ↔ shared resources ═══ -->

  <!-- TfLayer → WeightBram (TDot) -->
  <line x1="350" y1="206" x2="408" y2="206"
        stroke="#8E24AA" stroke-width="1.4" marker-end="url(#ap)"/>
  <text x="371" y="199" font-size="9.5" fill="#8E24AA"
        font-style="italic" text-anchor="middle">TDot</text>

  <!-- TfLayer → MacArray (MAC) -->
  <line x1="350" y1="239" x2="408" y2="239"
        stroke="#8E24AA" stroke-width="1.4" marker-end="url(#ap)"/>
  <text x="371" y="232" font-size="9.5" fill="#8E24AA"
        font-style="italic" text-anchor="middle">MAC</text>

  <!-- TfLayer → KvCache (K/V) -->
  <line x1="350" y1="271" x2="408" y2="271"
        stroke="#8E24AA" stroke-width="1.4" marker-end="url(#ap)"/>
  <text x="371" y="264" font-size="9.5" fill="#8E24AA"
        font-style="italic" text-anchor="middle">K/V</text>
</svg>
