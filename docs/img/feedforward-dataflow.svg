<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 460" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#546E7A"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8E24AA"/>
    </marker>
    <marker id="al" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#90A4AE"/>
    </marker>
  </defs>
  <rect width="580" height="460" fill="#fff"/>

  <text x="290" y="18" text-anchor="middle"
        font-size="13" font-weight="600" fill="#37474F">FeedForward — Up/Down Projection Dataflow</text>

  <!-- Input -->
  <rect x="140" y="34" width="140" height="24" rx="4"
        fill="#ECEFF1" stroke="#78909C" stroke-width="1.2"/>
  <text x="210" y="50" text-anchor="middle" font-size="10" fill="#37474F">x [64 × INT8]</text>

  <line x1="210" y1="58" x2="210" y2="78"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- ═══ UP_PROJ ═══ -->
  <rect x="50" y="78" width="340" height="70" rx="6"
        fill="none" stroke="#7CB342" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="66" y="93" font-size="10" font-weight="600" fill="#558B2F">UP_PROJ (8 TDot batches)</text>

  <rect x="70" y="102" width="120" height="36" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="130" y="118" text-anchor="middle"
        font-size="10" font-weight="500" fill="#2E7D32">TDot → ≫4</text>
  <text x="130" y="132" text-anchor="middle"
        font-size="8" fill="#66BB6A">SatInt8 + ReLU</text>

  <line x1="190" y1="120" x2="220" y2="120"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <rect x="220" y="102" width="150" height="36" rx="4"
        fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="295" y="118" text-anchor="middle"
        font-size="10" font-weight="500" fill="#1565C0">tdotCapture [32×INT8]</text>
  <text x="295" y="132" text-anchor="middle"
        font-size="8" fill="#42A5F5">inline ReLU for timing</text>

  <!-- Arrow down -->
  <line x1="210" y1="148" x2="210" y2="168"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- STORE_UP -->
  <rect x="120" y="168" width="180" height="28" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="210" y="186" text-anchor="middle"
        font-size="10" font-weight="500" fill="#2E7D32">STORE_UP (32 writes/batch)</text>


  <!-- Arrow down -->
  <line x1="210" y1="196" x2="210" y2="222"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- upMem (center divider) -->
  <rect x="110" y="222" width="200" height="32" rx="4"
        fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="210" y="238" text-anchor="middle"
        font-size="12" font-weight="500" fill="#6A1B9A">upMem [256 × INT8]</text>
  <text x="210" y="250" text-anchor="middle"
        font-size="8" fill="#AB47BC">BRAM · ReLU(up-projection output)</text>

  <!-- Arrow down -->
  <line x1="210" y1="254" x2="210" y2="276"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- LOAD_SLICE -->
  <rect x="85" y="276" width="250" height="28" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="210" y="294" text-anchor="middle"
        font-size="10" font-weight="500" fill="#2E7D32">LOAD_SLICE → tdotSliceBuf [64×INT8]</text>

  <!-- Arrow down -->
  <line x1="210" y1="304" x2="210" y2="326"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- ═══ DOWN_PROJ ═══ -->
  <rect x="50" y="326" width="340" height="56" rx="6"
        fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="66" y="341" font-size="10" font-weight="600" fill="#1565C0">DOWN_PROJ (4 passes × 2 batches)</text>

  <rect x="70" y="350" width="120" height="24" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="130" y="366" text-anchor="middle"
        font-size="10" font-weight="500" fill="#2E7D32">TDot (×2)</text>

  <line x1="190" y1="362" x2="220" y2="362"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <rect x="220" y="350" width="150" height="24" rx="4"
        fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="295" y="366" text-anchor="middle"
        font-size="10" font-weight="500" fill="#F57F17">accumBuf += result</text>


  <!-- Arrow down to DONE -->
  <line x1="210" y1="382" x2="210" y2="404"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- DONE -->
  <rect x="115" y="404" width="190" height="28" rx="4"
        fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="210" y="422" text-anchor="middle"
        font-size="10" font-weight="500" fill="#1565C0">DONE: SatInt8(accumBuf ≫ 4)</text>

  <!-- Output -->
  <rect x="420" y="404" width="140" height="28" rx="4"
        fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="490" y="422" text-anchor="middle"
        font-size="11" font-weight="600" fill="#C62828">result [64×INT8]</text>

  <line x1="305" y1="418" x2="420" y2="418"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- TDot shared resource -->
  <rect x="440" y="78" width="120" height="30" rx="4"
        fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="500" y="97" text-anchor="middle"
        font-size="10" font-weight="500" fill="#6A1B9A">TDot (shared)</text>

  <!-- TDot connections -->
  <!-- UP_PROJ → TDot (from right edge of phase box) -->
  <path d="M 390,85 H 440"
        stroke="#8E24AA" stroke-width="1.2" fill="none" marker-end="url(#ap)"/>
  <!-- DOWN_PROJ → TDot (from right edge of phase box, routed via gap) -->
  <path d="M 390,340 H 420 V 100 H 440"
        stroke="#8E24AA" stroke-width="1.2" fill="none" marker-end="url(#ap)"/>

  <!-- Note -->
  <text x="290" y="452" text-anchor="middle"
        font-size="9" fill="#90A4AE">UP: 64→256 (ReLU) · DOWN: 256→64 (4×64 slices) · ~5,840 cycles total</text>
</svg>
