<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#546E7A"/>
    </marker>
  </defs>
  <rect width="640" height="400" fill="#fff"/>

  <text x="320" y="18" text-anchor="middle"
        font-size="13" font-weight="600" fill="#37474F">Embedding — Dual-Mode (Embed + Logit) Dataflow</text>

  <!-- ═══ EMBEDDING MODE (left) ═══ -->
  <rect x="15" y="32" width="280" height="330" rx="6"
        fill="none" stroke="#7CB342" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="31" y="48" font-size="10" font-weight="600" fill="#558B2F">EMBEDDING MODE</text>

  <!-- Inputs -->
  <rect x="35" y="58" width="90" height="24" rx="4"
        fill="#ECEFF1" stroke="#78909C" stroke-width="1.2"/>
  <text x="80" y="74" text-anchor="middle" font-size="9" fill="#37474F">tokenId [7b]</text>

  <rect x="155" y="58" width="90" height="24" rx="4"
        fill="#ECEFF1" stroke="#78909C" stroke-width="1.2"/>
  <text x="200" y="74" text-anchor="middle" font-size="9" fill="#37474F">position [7b]</text>

  <!-- Arrows down -->
  <line x1="80" y1="82" x2="80" y2="106"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>
  <line x1="200" y1="82" x2="200" y2="106"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- BRAMs -->
  <rect x="35" y="106" width="100" height="36" rx="4"
        fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="85" y="122" text-anchor="middle"
        font-size="9" font-weight="500" fill="#6A1B9A">tokEmbMem</text>
  <text x="85" y="136" text-anchor="middle"
        font-size="7" fill="#AB47BC">8192×INT16</text>

  <rect x="155" y="106" width="100" height="36" rx="4"
        fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="205" y="122" text-anchor="middle"
        font-size="9" font-weight="500" fill="#6A1B9A">posEmbMem</text>
  <text x="205" y="136" text-anchor="middle"
        font-size="7" fill="#AB47BC">8192×INT16</text>

  <!-- Arrows to sum -->
  <path d="M 85,142 V 160 H 130"
        stroke="#546E7A" stroke-width="1.3" fill="none" marker-end="url(#a)"/>
  <path d="M 205,142 V 160 H 180"
        stroke="#546E7A" stroke-width="1.3" fill="none" marker-end="url(#a)"/>

  <!-- Sum -->
  <rect x="130" y="152" width="50" height="24" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="155" y="168" text-anchor="middle"
        font-size="10" font-weight="600" fill="#2E7D32">+</text>

  <!-- Arrow down -->
  <line x1="155" y1="176" x2="155" y2="200"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="178" y="192" font-size="8" fill="#90A4AE" font-style="italic">INT16</text>

  <!-- outputMem -->
  <rect x="75" y="200" width="160" height="30" rx="4"
        fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="155" y="216" text-anchor="middle"
        font-size="10" font-weight="500" fill="#6A1B9A">outputMem [64×INT16]</text>
  <text x="155" y="227" text-anchor="middle"
        font-size="7" fill="#AB47BC">sequential readout</text>

  <!-- Arrow down -->
  <line x1="155" y1="230" x2="155" y2="254"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Sequencer pipeline -->
  <rect x="55" y="254" width="200" height="44" rx="4"
        fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="155" y="272" text-anchor="middle"
        font-size="9" font-weight="500" fill="#1565C0">Sequencer 2-stage pipeline</text>
  <text x="155" y="286" text-anchor="middle"
        font-size="8" fill="#42A5F5">SatInt8(val ≫ 3) → embPipe → actBuf</text>
  <text x="155" y="296" text-anchor="middle"
        font-size="7" fill="#42A5F5">breaks BRAM→SatInt8→actBuf path</text>

  <!-- Output -->
  <line x1="155" y1="298" x2="155" y2="322"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <rect x="85" y="322" width="140" height="24" rx="4"
        fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="155" y="338" text-anchor="middle"
        font-size="10" font-weight="600" fill="#C62828">actBuf [64×INT8]</text>

  <!-- ═══ LOGIT MODE (right) ═══ -->
  <rect x="330" y="32" width="295" height="330" rx="6"
        fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="346" y="48" font-size="10" font-weight="600" fill="#1565C0">LOGIT MODE (8× parallel pipeline)</text>

  <!-- Inputs -->
  <rect x="350" y="58" width="110" height="24" rx="4"
        fill="#ECEFF1" stroke="#78909C" stroke-width="1.2"/>
  <text x="405" y="74" text-anchor="middle" font-size="9" fill="#37474F">queryVec [64×INT8]</text>

  <rect x="490" y="58" width="110" height="24" rx="4"
        fill="#ECEFF1" stroke="#78909C" stroke-width="1.2"/>
  <text x="545" y="74" text-anchor="middle" font-size="9" fill="#37474F">logitTokenId [7b]</text>

  <!-- logitTokenId → tokEmbWide (address) -->
  <line x1="545" y1="82" x2="545" y2="106"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- queryVec → 8× Multiply (bypasses tokEmbWide via left margin) -->
  <path d="M 405,82 V 90 H 360 V 175 H 390"
        stroke="#546E7A" stroke-width="1.3" fill="none" marker-end="url(#a)"/>

  <!-- tokEmbWide -->
  <rect x="390" y="106" width="176" height="36" rx="4"
        fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="478" y="122" text-anchor="middle"
        font-size="9" font-weight="500" fill="#6A1B9A">tokEmbWide [1024×128b]</text>
  <text x="478" y="136" text-anchor="middle"
        font-size="7" fill="#AB47BC">8 INT16 values per word</text>

  <!-- Arrow down -->
  <line x1="478" y1="142" x2="478" y2="166"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="518" y="158" font-size="8" fill="#90A4AE" font-style="italic">8×INT16</text>

  <!-- 8× Multiply -->
  <rect x="390" y="166" width="176" height="36" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="478" y="182" text-anchor="middle"
        font-size="10" font-weight="500" fill="#2E7D32">8× Multiply (LUT)</text>
  <text x="478" y="196" text-anchor="middle"
        font-size="8" fill="#66BB6A">INT8×INT16 · USE_DSP="no"</text>

  <!-- Arrow down -->
  <line x1="478" y1="202" x2="478" y2="226"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Adder tree -->
  <rect x="405" y="226" width="146" height="28" rx="4"
        fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="478" y="244" text-anchor="middle"
        font-size="10" font-weight="500" fill="#1565C0">Adder tree 8→4→2→1</text>

  <!-- Arrow down -->
  <line x1="478" y1="254" x2="478" y2="278"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Accumulate -->
  <rect x="405" y="278" width="146" height="28" rx="4"
        fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="478" y="296" text-anchor="middle"
        font-size="10" font-weight="500" fill="#F57F17">logitAcc += partial</text>

  <!-- Arrow down -->
  <line x1="478" y1="306" x2="478" y2="330"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Output -->
  <rect x="405" y="330" width="146" height="24" rx="4"
        fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="478" y="346" text-anchor="middle"
        font-size="10" font-weight="600" fill="#C62828">logitResult INT24</text>

  <!-- Note -->
  <text x="320" y="388" text-anchor="middle"
        font-size="9" fill="#90A4AE">Embed: ~65 cyc · Logit: ~15 cyc/token × 128 vocab = ~1,920 cyc (8× parallel bandwidth)</text>
</svg>
