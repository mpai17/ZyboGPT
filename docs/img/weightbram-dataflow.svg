<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#546E7A"/>
    </marker>
    <marker id="al" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#90A4AE"/>
    </marker>
  </defs>
  <rect width="640" height="460" fill="#fff"/>

  <text x="320" y="18" text-anchor="middle"
        font-size="13" font-weight="600" fill="#37474F">WeightBram — Load-then-Compute Dataflow</text>

  <!-- ══════ LOADING PHASE (left column) ══════ -->
  <rect x="20" y="32" width="260" height="290" rx="6"
        fill="none" stroke="#7CB342" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="36" y="50" font-size="11" font-weight="600"
        fill="#558B2F" letter-spacing="0.5">LOADING (103 cycles)</text>

  <!-- weightMem -->
  <rect x="55" y="60" width="190" height="36" rx="4"
        fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="150" y="76" text-anchor="middle"
        font-size="12" font-weight="500" fill="#6A1B9A">weightMem</text>
  <text x="150" y="90" text-anchor="middle"
        font-size="9" fill="#AB47BC">4,944 × 32b BRAM</text>

  <!-- Arrow down -->
  <line x1="150" y1="96" x2="150" y2="120"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="192" y="112" font-size="9" fill="#90A4AE" font-style="italic">32b/cyc</text>

  <!-- 4× WeightDecoder -->
  <rect x="45" y="120" width="210" height="40" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="150" y="138" text-anchor="middle"
        font-size="12" font-weight="500" fill="#2E7D32">4× WeightDecoder</text>
  <text x="150" y="153" text-anchor="middle"
        font-size="9" fill="#66BB6A">divmod3 pipeline · 6-cyc latency</text>

  <!-- Arrow down -->
  <line x1="150" y1="160" x2="150" y2="184"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="198" y="176" font-size="9" fill="#90A4AE" font-style="italic">20 trits (40b)</text>

  <!-- Pack -->
  <rect x="60" y="184" width="180" height="28" rx="4"
        fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="150" y="202" text-anchor="middle"
        font-size="11" font-weight="500" fill="#1565C0">Pack 4×5 trits → 40b</text>

  <!-- Arrow down -->
  <line x1="150" y1="212" x2="150" y2="236"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- decodedBankMem -->
  <rect x="45" y="236" width="210" height="36" rx="4"
        fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="150" y="252" text-anchor="middle"
        font-size="12" font-weight="500" fill="#6A1B9A">decodedBankMem</text>
  <text x="150" y="266" text-anchor="middle"
        font-size="9" fill="#AB47BC">103 × 40b BRAM</text>

  <!-- ══════ COMPUTE PHASE (right column) ══════ -->
  <rect x="320" y="32" width="300" height="390" rx="6"
        fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="336" y="50" font-size="11" font-weight="600"
        fill="#1565C0" letter-spacing="0.5">COMPUTE (×32 rows, ~128 cycles)</text>

  <!-- Assemble Row -->
  <rect x="360" y="64" width="220" height="40" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="470" y="81" text-anchor="middle"
        font-size="12" font-weight="500" fill="#2E7D32">Assemble Row</text>
  <text x="470" y="96" text-anchor="middle"
        font-size="9" fill="#66BB6A">4 bank reads · BankSlice mapping</text>

  <!-- Arrow from decodedBankMem to Assemble -->
  <path d="M 255,254 H 300 V 84 H 360"
        stroke="#546E7A" stroke-width="1.3" fill="none" marker-end="url(#a)"/>

  <!-- Arrow down -->
  <line x1="470" y1="104" x2="470" y2="130"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="512" y="121" font-size="9" fill="#90A4AE" font-style="italic">64 × 2b</text>

  <!-- weightReg -->
  <rect x="395" y="130" width="150" height="28" rx="4"
        fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="470" y="148" text-anchor="middle"
        font-size="11" font-weight="500" fill="#1565C0">weightReg [64×2b]</text>

  <!-- Arrow down from weightReg -->
  <line x1="470" y1="158" x2="470" y2="200"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- tdotX input -->
  <rect x="340" y="175" width="100" height="26" rx="4"
        fill="#ECEFF1" stroke="#78909C" stroke-width="1.2"/>
  <text x="390" y="192" text-anchor="middle"
        font-size="10" fill="#37474F">tdotX [64×INT8]</text>

  <!-- Arrow from tdotX -->
  <path d="M 390,201 V 218 H 395"
        stroke="#546E7A" stroke-width="1.3" fill="none" marker-end="url(#a)"/>

  <!-- TDotUnit -->
  <rect x="395" y="205" width="150" height="36" rx="4"
        fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="470" y="222" text-anchor="middle"
        font-size="12" font-weight="500" fill="#2E7D32">TDotUnit</text>
  <text x="470" y="235" text-anchor="middle"
        font-size="9" fill="#66BB6A">3-stage adder tree</text>

  <!-- Arrow down -->
  <line x1="470" y1="241" x2="470" y2="268"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>
  <text x="508" y="259" font-size="9" fill="#90A4AE" font-style="italic">INT24</text>

  <!-- resultRegs[row] -->
  <rect x="395" y="268" width="150" height="28" rx="4"
        fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="470" y="286" text-anchor="middle"
        font-size="11" font-weight="500" fill="#F57F17">resultRegs[row]</text>

  <!-- Loop-back arrow: enters Assemble Row from the top -->
  <path d="M 545,282 H 590 V 56 H 470 V 64"
        stroke="#90A4AE" stroke-width="1" fill="none"
        stroke-dasharray="4 3" marker-end="url(#al)"/>
  <text x="597" y="175" font-size="9" fill="#90A4AE" font-style="italic"
        transform="rotate(-90 597 175)">next row</text>

  <!-- Arrow down to output -->
  <line x1="470" y1="296" x2="470" y2="330"
        stroke="#546E7A" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Output results -->
  <rect x="380" y="330" width="180" height="28" rx="4"
        fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="470" y="348" text-anchor="middle"
        font-size="12" font-weight="600" fill="#C62828">results [32 × INT24]</text>

  <!-- Note -->
  <text x="320" y="445" text-anchor="middle"
        font-size="9" fill="#90A4AE">LOADING: 103 cyc (20 trits/cyc) · COMPUTE: ~128 cyc (4 reads + TDot per row × 32 rows)</text>
</svg>
